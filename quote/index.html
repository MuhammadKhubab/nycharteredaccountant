<div id="content" class="site-content">
    <div class="content-inner">
        <div class="container content-container">
            <div class="row content-row">
                <div id="primary" class="content-area content-full-width col-12">
                    <main id="main" class="site-main">

                        <section class="elementor-section elementor-top-section">
                            <div class="container">

                                <div class="ct-heading">
                                    <h3>Request a Quote</h3>
                                    <p>Fill your details and we will contact you.</p>
                                </div>

                                <div style="background:#fff; padding:30px; border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,0.08);">

                                    <form id="quoteForm">

                                        <input type="text" id="name" class="form-control mb-3" placeholder="Your Name" required>

                                        <input type="email" id="email" class="form-control mb-3" placeholder="Email Address" required>

                                        <input type="text" id="phone" class="form-control mb-3" placeholder="Phone Number" required>

                                        <select id="service" class="form-control mb-3" required>
                                            <option value="">Select Service</option>
                                            <option>Accounting & Bookkeeping</option>
                                            <option>Tax Filing</option>
                                            <option>Audit & Assurance</option>
                                            <option>Business Registration</option>
                                        </select>

                                        <textarea id="message" class="form-control mb-3" placeholder="Your Message"></textarea>

                                        <button type="submit" class="btn btn-default icon-ps-right">
                                            Send Request
                                        </button>

                                        <div id="successMsg" style="display:none; color:green; margin-top:10px;">
                                            ✅ Request sent successfully!
                                        </div>

                                    </form>

                                </div>

                            </div>
                        </section>

                    </main>
                </div>
            </div>
        </div>
    </div>
</div>
